apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tachyne-world
  namespace: tachyne
  labels:
    app.kubernetes.io/name: tachyne
    app.kubernetes.io/component: world
    app.kubernetes.io/part-of: tachyne
spec:
  serviceName: tachyne-world-hl
  # DEFAULT: one pod = one full, unconstrained, procedurally generated world.
  # For the SHARDED world (N pods each owning a region of one world, seamless
  # handover), set replicas == the number of regions in topology.yaml and add
  # the sharding args below. For EARTH MODE (real terrain), see the variant
  # args below and docs/EARTH.md.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tachyne
      app.kubernetes.io/component: world
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tachyne
        app.kubernetes.io/component: world
        app.kubernetes.io/part-of: tachyne
    spec:
      containers:
        - name: world
          image: ghcr.io/tachyne/tachyne-world:latest
          imagePullPolicy: Always
          # The full classic world — no sharding, no earth mode, no boundaries.
          args: ["-seed", "1", "-gamemode", "survival", "-attach", ":25500", "-ops", "<op1>,<op2>", "-nats", "nats://tachyne-nats.tachyne.svc.cluster.local:4222", "-valkey", "tachyne-cache.tachyne.svc.cluster.local:6379"]
          # SHARDED variant (replicas == regions in topology.yaml; see
          # docs/SHARDING-BUILD.md) — add:
          #   "-topology", "/etc/tachyne/topology.json",
          #   "-peer-addr", ":25501",
          #   "-peer-pattern", "tachyne-world-%d.tachyne-world-hl.tachyne.svc.cluster.local:25501"
          # EARTH MODE variant (real terrain — greater Cape Town at 1:1; see
          # docs/EARTH.md) — add:
          #   "-earth", "capetown", "-earth-vscale", "4.5", "-spawn", "-647,1447", "-gamemode", "creative"
          env:
            - name: POD_NAME # the trailing ordinal is this world pod's SID (unused by the server yet)
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ATTACH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tachyne-attach-token
                  key: token
          ports:
            - containerPort: 25500
              name: attach
            - containerPort: 25501
              name: peer
          readinessProbe:
            tcpSocket:
              port: attach
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: attach
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /var/world
            # SHARDED variant — also mount the region map (deploy/topology.yaml):
            #- name: topology
            #  mountPath: /etc/tachyne
            #  readOnly: true
      #volumes: # SHARDED variant
      #  - name: topology
      #    configMap:
      #      name: tachyne-world-topology
      imagePullSecrets:
        - name: forgejo-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
