# tachyne-nats: the world's plugin/event bus (the cluster-shared NATS requires
# auth we don't hold). No persistence — it's a live message fabric.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tachyne-nats
  namespace: tachyne
  labels: {app.kubernetes.io/name: tachyne, app.kubernetes.io/component: nats, app.kubernetes.io/part-of: tachyne}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: tachyne, app.kubernetes.io/component: nats}
  template:
    metadata:
      labels: {app.kubernetes.io/name: tachyne, app.kubernetes.io/component: nats, app.kubernetes.io/part-of: tachyne}
    spec:
      containers:
        - name: nats
          image: nats:2-alpine
          ports: [{containerPort: 4222, name: nats}]
          readinessProbe: {tcpSocket: {port: nats}, initialDelaySeconds: 2, periodSeconds: 10}
          livenessProbe: {tcpSocket: {port: nats}, initialDelaySeconds: 10, periodSeconds: 30}
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {cpu: 500m, memory: 128Mi}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}, runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000}
      securityContext: {seccompProfile: {type: RuntimeDefault}}
---
apiVersion: v1
kind: Service
metadata:
  name: tachyne-nats
  namespace: tachyne
  labels: {app.kubernetes.io/name: tachyne, app.kubernetes.io/component: nats}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: tachyne, app.kubernetes.io/component: nats}
  ports: [{name: nats, port: 4222, targetPort: nats}]
