# Builds the component image on every push to main and publishes it to
# ghcr.io/tachyne/tachyne-world:{latest,<short-sha>} — the images the cluster deploys.
name: build
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          IMG=ghcr.io/tachyne/tachyne-world
          docker build -t "$IMG:latest" -t "$IMG:${GITHUB_SHA::7}" .
          docker push "$IMG:latest"
          docker push "$IMG:${GITHUB_SHA::7}"
